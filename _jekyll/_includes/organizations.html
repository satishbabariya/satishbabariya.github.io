<section class="section other-projects">
  <div class="section__title">Organizations</div>
  <div class="section__content">
    {% for org in site.data.organizations %}
    <div class="project">
      <div class="project__name">
        <a href="{{org.url}}" target="_blank" class="arrow-link"
          >{{org.name}}</a
        >
      </div>
      <p>{{org.description}}</p>
      <div class="project__used">
        {% for item in org.role %}
        <span class="project__used__item">{{item.thing}}</span>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>
</section>
